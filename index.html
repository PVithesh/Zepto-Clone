<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zepto - 10 Minutes Delivery</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="shortcut icon"
      href="./assets/zepto-logo-app-icon.webp"
      type="image/x-icon"
    />
  </head>
  <body>
    <!--* NavBav -->
    <nav>
      <section id="nav">
        <aside id="logo-address">
          <div id="logo">Z</div>
          <div id="address">
            <p>Delivery in<span> 10 mins</span></p>
            <p id="location">
              <i class="fa-solid fa-location-dot"></i> Select Address
            </p>
          </div>
        </aside>
        <aside id="links">
          <a href="./index.html" class="active">Home</a>
          <a href="./products.html">Products</a>
        </aside>
        <aside id="user-cart">
          <i class="fa-regular fa-user"></i>
          <i class="fa-solid fa-cart-shopping"></i>
        </aside>
      </section>
      <section id="nav2"></section>
    </nav>
    <!--* Header -->
    <header>
      <div id="banner-container">
        <img src="./assets/hero-background-1.png" alt="banner1" />
        <img src="./assets/hero-background-2.png" alt="banner2" />
        <img src="./assets/hero-background-1.png" alt="banner2" />
      </div>
    </header>
    <!--* Category -->
    <section id="category">
      <article id="category-title">
        <h2>Shop by Category</h2>
      </article>
      <article id="category-items">
        <!-- <div class="category-card">
                <div class="category-img">🤍</div>
                <p class="category-name">name</p>
            </div> -->
      </article>
    </section>
    <!-- !HIGHLIGHTS -->
    <section id="highlights">
      <div class="highlight-container one">
        <p class="highlight-icon">🚴</p>
        <p class="highlight-title">Free Delivery</p>
        <p class="highlight-description">On order above ₹149/-</p>
      </div>
      <div class="highlight-container two">
        <p class="highlight-icon">⚡</p>
        <p class="highlight-title">10 mins delivery</p>
        <p class="highlight-description">Lightening fast</p>
      </div>
      <div class="highlight-container three">
        <p class="highlight-icon">💸</p>
        <p class="highlight-title">Best Prices</p>
        <p class="highlight-description">Directly from farms</p>
      </div>
      <div class="highlight-container four">
        <p class="highlight-icon">🛍️</p>
        <p class="highlight-title">Wide assortment</p>
        <p class="highlight-description">5000+ products</p>
      </div>
    </section>
    <!-- !FOOTER -->
    <footer>
      <h2>Zepto</h2>
      <p>&copy; 2026 | 10 Minutes Delivery</p>
      <p>194 products across 24 categories.</p>
    </footer>
    <script src="./script.js"></script>
  </body>
</html>
